name: ci
# Required status check for branch protection on `main`.
# Enforces D-02 (Phase 0): typecheck + lint + format:check + build + gitleaks must all pass.
# Enforces D-17 (Phase 1 / Plan 01-04): unit tests (Vitest, middleware-scope) must pass.
# Deferred (per D-04 Phase 0): axe a11y (Phase 7), Lighthouse CI (Phase 7).

on:
  pull_request:
    branches: [main]
  # Also run on pushes to main (belt-and-braces — branch protection should block direct pushes,
  # but this catches any admin-override bypass).
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Required so gitleaks-action can post a redacted finding summary as a check-run annotation.
      checks: write
      # Allow the workflow to read secret-scanning alerts (D-07 context — not required, but useful).
      security-events: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan the entire PR diff range.
          fetch-depth: 0

      # Corepack activates the exact pnpm version from package.json `packageManager`.
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Required check 1 (D-02): typecheck ---
      - name: Typecheck
        run: pnpm typecheck

      # --- Required check 2 (D-02): lint (ESLint) ---
      - name: Lint
        run: pnpm lint

      # --- Required check 2b (D-02): Prettier format check ---
      - name: Format check
        run: pnpm format:check

      # --- Required check 3 (D-02): build ---
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Plan 01-03 deferred env wiring: Sanity config fails fast at module-eval if
          # NEXT_PUBLIC_SANITY_* vars are missing. Production/Preview env comes from
          # Vercel dashboard at deploy time; CI just needs the build to compile, so we
          # pass placeholder values here. Studio never runs at build — only client-side.
          NEXT_PUBLIC_SANITY_PROJECT_ID: "build-placeholder"
          NEXT_PUBLIC_SANITY_DATASET: "build-placeholder"

      # --- Required check 4 (Phase 1 / D-17): unit tests (Vitest, middleware-scope) ---
      # Regression gate for the D-02 host-authority invariant, the D-04 internal-rewrite
      # invariant, and the D-07 /studio pass-through invariant — see middleware.test.ts.
      - name: Unit tests
        run: pnpm test:unit

      # --- Required check 5 (D-02 / D-07): gitleaks — layer 3 of the four-layer defense ---
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
